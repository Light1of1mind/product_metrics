<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Симулятор продуктовых метрик CIAM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <header>
      <h1>Симулятор продуктовых метрик CIAM</h1>
      <div class="header-actions">
        <button id="shareLink">Скопировать ссылку</button>
        <button id="recalc">Пересчитать</button>
      </div>
    </header>

    <div class="grid">

      <!-- INPUTS -->
      <section class="panel">
        <h2>Параметры</h2>

        <h3>Регистрация</h3>
        <div class="field">
          <label for="regAttempts">Запросы на регистрацию: <span class="value" id="regAttemptsValue">2000</span></label>
          <input id="regAttempts" type="range" min="100" max="1000000" step="1" value="2000">
        </div>
        <div class="field">
          <label for="regFields">Количество полей в форме регистрации: <span class="value" id="regFieldsValue">3</span></label>
          <input id="regFields" type="range" min="1" max="10" step="1" value="3">
        </div>

        <h3>Вход</h3>
        <div class="field">
          <label for="loginAttempts">Запросы логина: <span class="value" id="loginAttemptsValue">15000</span></label>
          <input id="loginAttempts" type="range" min="100" max="10000000" step="1" value="15000">
        </div>
        <div class="field">
          <label for="loginFields">Количество полей в форме входа: <span class="value" id="loginFieldsValue">2</span></label>
          <input id="loginFields" type="range" min="1" max="3" step="1" value="2">
        </div>

        <h3>Платформа</h3>
        <div class="field">
          <label for="responseTime">Время отклика, мс: <span class="value" id="responseTimeValue">300</span></label>
          <input id="responseTime" type="range" min="20" max="5000" step="10" value="300">
        </div>
        <div class="field">
          <label for="uptime">Доступность (Uptime), %: <span class="value" id="uptimeValue">98</span></label>
          <input id="uptime" type="range" min="0" max="100" step="1" value="98">
        </div>
        <div class="field">
          <label for="errorRate">Доля ошибок (Error Rate), %: <span class="value" id="errorRateValue">5</span></label>
          <input id="errorRate" type="range" min="0" max="100" step="1" value="5">
        </div>
        <div class="field">
          <label for="otpDelivery">Время доставки OTP, сек: <span class="value" id="otpDeliveryValue">10</span></label>
          <input id="otpDelivery" type="range" min="1" max="180" step="1" value="10">
        </div>

        <h3>Стоимость OTP</h3>
        <div class="field">
          <label for="smsCost">Стоимость SMS, ₽: <span class="value" id="smsCostValue">8</span></label>
          <input id="smsCost" type="range" min="0" max="100" step="1" value="8">
        </div>
        <div class="field">
          <label for="pushCost">Стоимость Push, ₽: <span class="value" id="pushCostValue">1</span></label>
          <input id="pushCost" type="range" min="0" max="100" step="1" value="1">
        </div>
        <div class="field">
          <label for="emailCost">Стоимость Email, ₽: <span class="value" id="emailCostValue">0</span></label>
          <input id="emailCost" type="range" min="0" max="100" step="1" value="0">
        </div>
        <div class="field">
          <label for="totpCost">Стоимость TOTP, ₽: <span class="value" id="totpCostValue">0</span></label>
          <input id="totpCost" type="range" min="0" max="100" step="1" value="0">
        </div>

        <h3>Доли типов OTP</h3>
        <div class="field">
          <label for="smsShare">Доля SMS, %: <span class="value" id="smsShareValue">80</span></label>
          <input id="smsShare" type="range" min="0" max="100" step="1" value="80">
        </div>
        <div class="field">
          <label for="pushShare">Доля Push, %: <span class="value" id="pushShareValue">10</span></label>
          <input id="pushShare" type="range" min="0" max="100" step="1" value="10">
        </div>
        <div class="field">
          <label for="emailShare">Доля Email, %: <span class="value" id="emailShareValue">10</span></label>
          <input id="emailShare" type="range" min="0" max="100" step="1" value="10">
        </div>
        <div class="field">
          <label for="totpShare">Доля TOTP, %: <span class="value" id="totpShareValue">0</span></label>
          <input id="totpShare" type="range" min="0" max="100" step="1" value="0">
        </div>

        <h3>Мобильное приложение (биометрия)</h3>
        <div class="field">
          <label for="appShare">Доля входов по биометрии (без OTP), %: <span class="value" id="appShareValue">80</span></label>
          <input id="appShare" type="range" min="0" max="100" step="1" value="80">
        </div>

        <h3>Поддержка</h3>
        <div class="field">
          <label for="supportCalls">Количество обращений в поддержку: <span class="value" id="supportCallsValue">2000</span></label>
          <input id="supportCalls" type="range" min="0" max="1000000" step="1" value="2000">
        </div>
        <div class="field">
          <label for="supportHours">Часов на одно обращение: <span class="value" id="supportHoursValue">0.3</span></label>
          <input id="supportHours" type="range" min="0" max="2" step="0.1" value="0.3">
        </div>
        <div class="field">
          <label for="supportHourCost">Стоимость часа поддержки, ₽: <span class="value" id="supportHourCostValue">1500</span></label>
          <input id="supportHourCost" type="range" min="0" max="10000" step="1" value="1500">
        </div>
      </section>

      <!-- KPI -->
      <section class="panel">
        <h2>Показатели (KPI)</h2>

        <div id="kpi"></div>

        <h3>Воронка регистрации</h3>
        <div id="regFunnel"></div>

        <h3>Воронка входа</h3>
        <div id="loginFunnel"></div>
      </section>

    </div>
  </div>

  <script src="dictionaries.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
