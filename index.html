<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Симулятор продуктовых метрик CIAM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <header>
      <h1>Симулятор продуктовых метрик CIAM</h1>
      <div class="header-actions">
        <button id="shareLink">Скопировать ссылку</button>
        <button id="recalc">Пересчитать</button>
      </div>
    </header>

    <div class="grid">

      <!-- INPUTS -->
      <section class="panel">
        <h2>Параметры</h2>

        <h3>Регистрация</h3>
        <div class="field">
          <label for="regAttempts">Попытки регистрации</label>
          <input id="regAttempts" type="number" placeholder="например, 1000">
        </div>
        <div class="field">
          <label for="regFields">Количество полей в форме регистрации</label>
          <input id="regFields" type="number" placeholder="например, 3">
        </div>

        <h3>Вход</h3>
        <div class="field">
          <label for="loginAttempts">Попытки входа</label>
          <input id="loginAttempts" type="number" placeholder="например, 500">
        </div>
        <div class="field">
          <label for="loginFields">Количество полей в форме входа</label>
          <input id="loginFields" type="number" placeholder="например, 2">
        </div>

        <h3>Платформа</h3>
        <div class="field">
          <label for="responseTime">Время отклика, мс: <span class="value" id="responseTimeValue">300</span></label>
          <input id="responseTime" type="range" min="20" max="5000" step="10" value="300">
        </div>
        <div class="field">
          <label for="uptime">Доступность (Uptime), %</label>
          <input id="uptime" type="number" placeholder="например, 99.5">
        </div>
        <div class="field">
          <label for="errorRate">Доля ошибок (Error Rate), %</label>
          <input id="errorRate" type="number" placeholder="например, 1">
        </div>
        <div class="field">
          <label for="otpDelivery">Время доставки OTP, сек</label>
          <input id="otpDelivery" type="number" placeholder="например, 10">
        </div>

        <h3>Стоимость OTP</h3>
        <div class="field">
          <label for="smsCost">Стоимость SMS, ₽</label>
          <input id="smsCost" type="number" placeholder="например, 3">
        </div>
        <div class="field">
          <label for="pushCost">Стоимость Push, ₽</label>
          <input id="pushCost" type="number" placeholder="например, 0.5">
        </div>
        <div class="field">
          <label for="emailCost">Стоимость Email, ₽</label>
          <input id="emailCost" type="number" placeholder="например, 0.3">
        </div>
        <div class="field">
          <label for="totpCost">Стоимость TOTP, ₽</label>
          <input id="totpCost" type="number" placeholder="например, 0">
        </div>

        <h3>Доли типов OTP</h3>
        <div class="field">
          <label for="smsShare">Доля SMS, %</label>
          <input id="smsShare" type="number" placeholder="например, 70">
        </div>
        <div class="field">
          <label for="pushShare">Доля Push, %</label>
          <input id="pushShare" type="number" placeholder="например, 15">
        </div>
        <div class="field">
          <label for="emailShare">Доля Email, %</label>
          <input id="emailShare" type="number" placeholder="например, 10">
        </div>
        <div class="field">
          <label for="totpShare">Доля TOTP, %</label>
          <input id="totpShare" type="number" placeholder="например, 5">
        </div>

        <h3>Мобильное приложение (биометрия)</h3>
        <div class="field">
          <label for="appShare">Доля входов по биометрии (без OTP), %</label>
          <input id="appShare" type="number" placeholder="например, 40">
        </div>

        <h3>Поддержка</h3>
        <div class="field">
          <label for="supportCalls">Количество обращений в поддержку</label>
          <input id="supportCalls" type="number" placeholder="например, 20">
        </div>
        <div class="field">
          <label for="supportHours">Часов на одно обращение</label>
          <input id="supportHours" type="number" placeholder="например, 0.25">
        </div>
        <div class="field">
          <label for="supportHourCost">Стоимость часа поддержки, ₽</label>
          <input id="supportHourCost" type="number" placeholder="например, 800">
        </div>
      </section>

      <!-- KPI -->
      <section class="panel">
        <h2>Показатели (KPI)</h2>

        <div id="kpi"></div>

        <h3>Воронка регистрации</h3>
        <div id="regFunnel"></div>

        <h3>Воронка входа</h3>
        <div id="loginFunnel"></div>
      </section>

    </div>
  </div>

  <script src="dictionaries.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
